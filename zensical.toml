[project]
site_name = "Rillo"
site_description = "Rillo is a lightweight, type-safe Event Sourcing framework for Python, built on top of Pydantic."
site_author = "Mete Sengul"
site_url = "https://mustafametesengul.github.io/rillo/"
repo_url = "https://github.com/mustafametesengul/rillo"
copyright = """
Copyright &copy; 2026 Mete Sengul
"""

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"
